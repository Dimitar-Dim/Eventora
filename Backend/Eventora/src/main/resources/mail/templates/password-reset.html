<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset your Eventora password</title>
</head>
<body>
<p>Hi <span th:text="${username}">there</span>,</p>
<p>We received a request to reset your Eventora password. Click the button below to set a new one.</p>
<p><a th:href="${resetUrl}" style="display:inline-block;padding:10px 16px;background-color:#2563eb;color:#ffffff;text-decoration:none;border-radius:6px;">Reset Password</a></p>
<p>If the button does not work, paste this link into your browser:</p>
<p><span th:text="${resetUrl}">reset link</span></p>
<p>If you did not request this change, you can safely ignore this email.</p>
<p>Thanks,<br/>The Eventora Team</p>
</body>
</html>
