name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      started: ${{ steps.tstart.outputs.ts }}
      finished: ${{ steps.tend.outputs.ts }}
    steps:
      - id: tstart
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x Backend/Eventora/gradlew

      - name: Run backend tests
        working-directory: Backend/Eventora
        run: ./gradlew test --no-daemon

      - name: Backend SonarQube Analysis
        working-directory: Backend/Eventora
        run: |
          ./gradlew sonarqube \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            --no-daemon
        continue-on-error: true

      - id: tend
        if: always()
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

  frontend-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: Frontend
        run: npm ci
      
      - name: Frontend SonarQube Analysis
        working-directory: Frontend
        run: |
          npx sonar-scanner \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  e2e:
    needs: test-backend
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS]
    outputs:
      started: ${{ steps.tstart.outputs.ts }}
      finished: ${{ steps.tend.outputs.ts }}
    steps:
      - id: tstart
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Docker config (no keychain)
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          cat > "$RUNNER_TEMP/docker/config.json" << 'EOF'
          {
            "auths": {},
            "credsStore": ""
          }
          EOF
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - name: Start stack (e2e, keep DB)
        run: |
          docker-compose -f docker-compose.yaml up -d postgres
          docker-compose -f docker-compose.yaml stop backend frontend || true
          docker-compose -f docker-compose.yaml rm -f backend frontend || true
          docker-compose -f docker-compose.yaml up -d --build --no-deps backend frontend
          docker-compose -f docker-compose.yaml ps

      - name: Wait for backend (readiness)
        run: |
          for i in {1..120}; do
            code=$(curl -sS -o /tmp/h.json -w "%{http_code}" http://localhost:8081/actuator/health/readiness || echo 000)
            if [ "$code" = "200" ] && grep -q '"status":"UP"' /tmp/h.json; then exit 0; fi
            sleep 1
          done
          echo "Backend readiness failed"; cat /tmp/h.json; exit 1

      - name: Wait for web
        run: |
          for i in {1..90}; do
            curl -fsS http://localhost:3001 >/dev/null && exit 0 || true
            sleep 1
          done
          echo "Web not ready"; exit 1

      - name: Setup Node for Cypress
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Run Cypress headless
        run: |
          cd Frontend
          npm ci
          npx cypress install
          npx cypress run

      - name: Stop app services (keep DB)
        if: always()
        run: docker-compose -f docker-compose.yaml stop backend frontend || true

      - id: tend
        if: always()
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS]
    outputs:
      started: ${{ steps.tstart.outputs.ts }}
      finished: ${{ steps.tend.outputs.ts }}
    steps:
      - id: tstart
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - name: Docker config (no keychain)
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          cat > "$RUNNER_TEMP/docker/config.json" << 'EOF'
          {
            "auths": {},
            "credsStore": ""
          }
          EOF
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - name: Rebuild & restart stack (keep DB)
        run: |
          docker-compose -f docker-compose.yaml up -d postgres
          docker-compose -f docker-compose.yaml stop backend frontend || true
          docker-compose -f docker-compose.yaml rm -f backend frontend || true
          docker-compose -f docker-compose.yaml up -d --build --no-deps backend frontend
          docker-compose -f docker-compose.yaml ps

      - name: Wait for backend (readiness)
        run: |
          for i in {1..120}; do
            code=$(curl -sS -o /tmp/h.json -w "%{http_code}" http://localhost:8080/actuator/health/readiness || echo 000)
            if [ "$code" = "200" ] && grep -q '"status":"UP"' /tmp/h.json; then exit 0; fi
            sleep 1
          done
          echo "Backend readiness failed"; cat /tmp/h.json; exit 1

      - name: Check frontend
        run: curl -sSf http://localhost:3000 > /dev/null

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "--- compose ps ---"; docker-compose -f docker-compose.yaml ps
          echo "--- backend logs ---"; docker-compose -f docker-compose.yaml logs --tail=200 backend || true
          echo "--- frontend logs ---"; docker-compose -f docker-compose.yaml logs --tail=200 frontend || true
          echo "--- postgres logs ---"; docker-compose -f docker-compose.yaml logs --tail=200 postgres || true

      - id: tend
        if: always()
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

  summary:
    needs: [test-backend, e2e, build-and-deploy]
    if: always()
    runs-on: [self-hosted, macOS]
    steps:
      - name: Summarize timings
        run: |
          sec_to_hms() { printf "%02dh:%02dm:%02ds" $(($1/3600)) $((($1%3600)/60)) $(($1%60)); }
          TB=$(( ${{ needs.test-backend.outputs.finished || 0 }} - ${{ needs.test-backend.outputs.started || 0 }} ))
          E2E=$(( ${{ needs.e2e.outputs.finished || 0 }} - ${{ needs.e2e.outputs.started || 0 }} ))
          BD=$(( ${{ needs.build-and-deploy.outputs.finished || 0 }} - ${{ needs.build-and-deploy.outputs.started || 0 }} ))
          echo "### CI timings" >> $GITHUB_STEP_SUMMARY
          echo "- Test backend: $(sec_to_hms ${TB:-0})" >> $GITHUB_STEP_SUMMARY
          echo "- E2E: $(sec_to_hms ${E2E:-0})" >> $GITHUB_STEP_SUMMARY
          echo "- Build & deploy: $(sec_to_hms ${BD:-0})" >> $GITHUB_STEP_SUMMARY
