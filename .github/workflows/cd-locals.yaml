name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      started: ${{ steps.tstart.outputs.ts }}
      finished: ${{ steps.tend.outputs.ts }}
    steps:
      - id: tstart
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x Backend/Eventora/gradlew
      - name: Run backend tests
        working-directory: Backend/Eventora
        run: ./gradlew test --no-daemon
      - id: tend
        if: always()
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

  e2e:
    needs: test-backend
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    runs-on: [self-hosted, macOS]
    outputs:
      started: ${{ steps.tstart.outputs.ts }}
      finished: ${{ steps.tend.outputs.ts }}
    steps:
      - id: tstart
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
      - name: Start stack (e2e, no DB)
        run: |
          docker compose -f docker-compose.e2e.yml down --remove-orphans || true
          docker compose -f docker-compose.e2e.yml up -d --build --no-deps backend frontend
      - name: Wait for web
        run: |
          for i in {1..90}; do
            curl -fsS http://localhost:3001 && exit 0 || true
            sleep 1
          done
          echo "Web not ready"; exit 1
      - name: Run Cypress headless
        working-directory: Frontend
        run: |
          npm ci
          npx cypress install
          npx cypress run
      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
      - id: tend
        if: always()
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS]
    outputs:
      started: ${{ steps.tstart.outputs.ts }}
      finished: ${{ steps.tend.outputs.ts }}
    steps:
      - id: tstart
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
      - name: Rebuild & restart stack (no DB)
        run: |
          docker compose -f docker-compose.yaml down --remove-orphans || true
          docker compose -f docker-compose.yaml up -d --build --no-deps backend frontend
          docker compose -f docker-compose.yaml ps
      - name: Wait for backend
        run: |
          for i in {1..120}; do
            if curl -sSf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then exit 0; fi
            sleep 1
          done
          echo "Backend healthcheck failed"; exit 1
      - name: Check frontend
        run: curl -sSf http://localhost:3000 > /dev/null
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "--- compose ps ---"; docker compose -f docker-compose.yaml ps
          echo "--- backend logs ---"; docker compose -f docker-compose.yaml logs --tail=200 backend || true
          echo "--- frontend logs ---"; docker compose -f docker-compose.yaml logs --tail=200 frontend || true
      - id: tend
        if: always()
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

  summary:
    needs: [test-backend, e2e, build-and-deploy]
    if: always()
    runs-on: [self-hosted, macOS]
    steps:
      - name: Summarize timings
        run: |
          sec_to_hms() { printf "%02dh:%02dm:%02ds" $(($1/3600)) $((($1%3600)/60)) $(($1%60)); }
          TB=$(( ${{ needs.test-backend.outputs.finished || 0 }} - ${{ needs.test-backend.outputs.started || 0 }} ))
          E2E=$(( ${{ needs.e2e.outputs.finished || 0 }} - ${{ needs.e2e.outputs.started || 0 }} ))
          BD=$(( ${{ needs.build-and-deploy.outputs.finished || 0 }} - ${{ needs.build-and-deploy.outputs.started || 0 }} ))
          echo "### CI timings" >> $GITHUB_STEP_SUMMARY
          echo "- Test backend: $(sec_to_hms ${TB:-0})" >> $GITHUB_STEP_SUMMARY
          echo "- E2E: $(sec_to_hms ${E2E:-0})" >> $GITHUB_STEP_SUMMARY
          echo "- Build & deploy: $(sec_to_hms ${BD:-0})" >> $GITHUB_STEP_SUMMARY
