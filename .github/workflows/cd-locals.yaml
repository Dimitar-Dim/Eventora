name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x Backend/Eventora/gradlew
      - name: Run backend tests
        working-directory: Backend/Eventora
        run: ./gradlew test --no-daemon

  # Optional: E2E before deploy (requires Node+Cypress on runner)
  e2e:
    needs: test-backend
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          clean: false
      - name: Start stack (e2e)
        run: |
          docker compose -f docker-compose.e2e.yml down --remove-orphans || true
          docker compose -f docker-compose.e2e.yml up -d --build
      - name: Wait for web
        run: |
          for i in {1..90}; do
            curl -fsS http://localhost:3001 && exit 0 || true
            sleep 1
          done
          echo "Web not ready"; exit 1
      - name: Run Cypress headless
        working-directory: Frontend
        run: |
          npm ci
          npx cypress install
          npx cypress run
      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  build-and-deploy:
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild & restart stack
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d --build
          docker image prune -af --filter "until=72h" || true

      - name: Wait for backend
        run: |
          for i in {1..120}; do
            if curl -sSf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then exit 0; fi
            sleep 1
          done
          echo "Backend healthcheck failed"; exit 1

      - name: Check frontend
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:3000 >/dev/null && exit 0 || true
            sleep 1
          done
          echo "Frontend not reachable"; exit 1

      - name: Verify database
        run: docker compose exec -T db psql -U postgres -d eventora -c 'SELECT 1;'
