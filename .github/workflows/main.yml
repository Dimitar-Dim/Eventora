name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run backend tests
        working-directory: Backend/Eventora
        run: ./gradlew test

  build-and-deploy:
    needs: test-backend
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean up old images
        run: |
          docker image prune -af --filter "until=72h" || true

      - name: Build Backend Docker Image
        run: docker build -t eventora-backend:latest ./Backend/Eventora

      - name: Build Frontend Docker Image
        run: docker build -t eventora-frontend:latest ./Frontend

      - name: Restart Services
        run: |
          cd /Users/mitko/Repositories/Individual\ Project/Eventoria
          docker-compose down
          docker-compose up -d

      - name: Wait for services to start
        run: sleep 10

      - name: Health Check - Backend
        run: curl -f http://localhost:8080/actuator/health || exit 1

      - name: Health Check - Frontend
        run: curl -f http://localhost:3000 || exit 1

      - name: Verify Database
        run: |
          docker exec eventora_db psql -U postgres -d eventora -c "SELECT COUNT(*) FROM \"Event\";" || exit 1

      - name: Success Notification
        if: success()
        run: echo "✅ Deployment successful! App updated at http://localhost:3000"

      - name: Failure Notification
        if: failure()
        run: echo "❌ Deployment failed! Check GitHub Actions logs."