version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:16-alpine
    container_name: eventora-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ***REMOVED***
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "-c password_encryption=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - eventora_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventora-network

  # Backend Service
  backend:
    build:
      context: ./Backend/Eventora
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ***REMOVED***
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FRONTEND_URL: http://100.110.129.21:3000
      APP_MAIL_VERIFICATION_BASE_URL: http://100.110.129.21:3000/verify
      APP_MAIL_PASSWORD_RESET_BASE_URL: http://100.110.129.21:3000/reset-password
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eventora-network

  # Frontend Service
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://100.110.129.21:8080
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://100.110.129.21:8080
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - eventora-network

# Top-level volume definitions for persistence
volumes:
  eventora_db_data:

# Top-level network definition
networks:
  eventora-network:
    driver: bridge